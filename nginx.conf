# Serves the prerendered static site. TLS is terminated upstream by Traefik, so
# this listens plain HTTP on :80 inside the container.

# Long-cache immutable for hashed asset bundles; no-cache for HTML and feeds so
# new content shows up the moment a fresh image is deployed.
map $uri $cache_control {
    default                          "no-cache";
    ~^/assets/                       "public, max-age=31536000, immutable";
    ~^/images/                       "public, max-age=86400";
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip (brotli would need a module not shipped in nginx:alpine).
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/xml
        application/javascript application/json application/xml application/rss+xml
        image/svg+xml font/woff2;

    # Security headers (TLS/HSTS handled by Traefik).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Cache-Control $cache_control always;

    # Static assets must 404 when missing rather than fall through to the HTML
    # SPA fallback below — otherwise a missing bundle/image returns index.html
    # with a 200 and the wrong content-type.
    location ~ ^/(assets|images)/ {
        try_files $uri =404;
    }

    # Clean URLs: vite-react-ssg emits e.g. blog/slug.html, requested as /blog/slug.
    # Try the path, then the .html variant, then a directory, then SPA-fallback to
    # index.html (hydration renders the NotFound route for unknown paths).
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }
}
