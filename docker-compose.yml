# LOCAL / REFERENCE ONLY — no longer the production deploy mechanism.
# Production runs the Quadlet systemd unit at deploy/personal-website.container and
# pulls new images itself via podman-auto-update (see README §Deployment). This
# compose file is kept for local runs (`podman compose up`) and as a readable
# mirror of the container's Traefik wiring.
#
# Routing/TLS is handled by the existing Traefik stack (see ~/projects/traefik):
# external network `traefik-net`, HTTPS entrypoint `websecure`, certresolver
# `myresolver`, exposedbydefault=false.
services:
  personal-website:
    image: ghcr.io/mattschoe/personal-website:latest
    container_name: personal-website
    restart: unless-stopped
    networks:
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.personal-website.rule=Host(`mattschoe.dev`)"
      - "traefik.http.routers.personal-website.entrypoints=websecure"
      - "traefik.http.routers.personal-website.tls.certresolver=myresolver"
      - "traefik.http.services.personal-website.loadbalancer.server.port=80"
      # To also serve www.mattschoe.dev, change the rule above to
      #   Host(`mattschoe.dev`) || Host(`www.mattschoe.dev`)
      # and add a redirect middleware if you want www → apex.

networks:
  traefik-net:
    external: true
