name: Build & Publish

# Push to main → checks → build image → push to GHCR. Deployment is pull-based:
# the VPS runs podman-auto-update on a timer and rolls to the new :latest digest
# itself (see deploy/personal-website.container). CI never touches the VPS.
# Also runnable manually from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:
  # Daily rebuild so the homepage GitHub-activity graph stays fresh between
  # content pushes (the build bakes in a static snapshot; see the fetch step).
  schedule:
    - cron: '0 6 * * *'

# Serialize image publishes but never cancel one mid-flight; a newer push queues
# and runs after the current one finishes.
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

env:
  # Must be lowercase for a valid Docker ref — hardcoded rather than derived from
  # ${{ github.repository_owner }} (which is mixed-case) so the pushed tag always
  # matches the image referenced in deploy/personal-website.container.
  IMAGE: ghcr.io/mattschoe/personal-website
  SITE_URL: https://mattschoe.dev

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test

      # Refresh the GitHub-activity snapshot into the working tree before the
      # image build (Dockerfile's `COPY . .` carries it into the build context).
      # Fails soft: keeps the committed snapshot on any error. Default token =
      # public contributions only.
      - name: Fetch GitHub activity
        run: node scripts/fetch-github-activity.mjs
        env:
          GITHUB_ACTIVITY_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: |
            VITE_SITE_URL=${{ env.SITE_URL }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
