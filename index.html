<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Apply the theme before first paint to avoid a flash of the wrong theme.
         An explicit saved choice wins; otherwise fall back to the OS preference. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('matt-theme');
          var dark =
            saved === 'dark' ||
            (saved !== 'light' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) {
            document.documentElement.setAttribute('data-theme', 'dark');
          }
        } catch (e) {}
      })();
    </script>

    <!-- Fonts: Bricolage Grotesque (display), Newsreader (body), Space Mono (mono). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Space+Mono:wght@400;700&display=swap"
    />

    <!-- [m] logo · favicon set (favicon.svg auto-swaps light/dark). -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="icon" href="/favicon-16.png" sizes="16x16" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#221b16" />

    <title>Matthias Nielsen</title>
    <!-- Pre-hydration fallback; per-page tags are emitted by the <Seo> component. -->
    <meta
      name="description"
      content="I'm a software developer studying at the IT-University of Copenhagen. This place is where I keep my projects and writing, but most important of all, my beloved recipes."
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
